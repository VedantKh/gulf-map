<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gulf Conflict Updates — Live Map of Iranian Strikes & Threats</title>
    <meta name="description" content="Live, auto-updated map tracking verified Iranian missile strikes, drone attacks, and debris impacts across UAE, Bahrain, Qatar, Kuwait, Saudi Arabia, and Oman. Sources include Reuters, AP, Al Jazeera, CENTCOM, and government statements.">
    <meta name="keywords" content="Iran strikes, Gulf conflict, UAE attacks, drone strikes Middle East, Iran missile map, Gulf war 2026, Operation Epic Fury, Iran retaliation, Al Dhafra, Dubai airport attack">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://gulf-map.vercel.app/">

    <!-- Open Graph -->
    <meta property="og:title" content="Gulf Conflict Updates — Live Strike Map">
    <meta property="og:description" content="Live map of verified Iranian strikes across Gulf states. Auto-updated every 30 minutes with sourced data.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://gulf-map.vercel.app/">
    <meta property="og:locale" content="en_US">
    <meta property="og:site_name" content="Gulf Conflict Updates">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Gulf Conflict Updates — Live Strike Map">
    <meta name="twitter:description" content="Live map of verified Iranian strikes across Gulf states. Auto-updated every 30 min.">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #1a1a1a; }
        #map { width: 100%; height: 100vh; }

        /* Title overlay */
        .title-overlay {
            position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(255, 255, 255, 0.96);
            border: 1px solid #d1d5db; border-radius: 10px;
            padding: 12px 24px; text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            pointer-events: none; white-space: nowrap;
        }
        .title-overlay h1 { font-size: 17px; font-weight: 700; color: #b91c1c; letter-spacing: 0.5px; }
        .title-overlay p { font-size: 11px; color: #6b7280; margin-top: 3px; }

        /* Legend */
        .legend {
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 13px;
            line-height: 1.7;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            max-width: 280px;
        }
        .legend h4 {
            font-size: 13px; margin-bottom: 8px; color: #111;
            border-bottom: 1px solid #e5e7eb; padding-bottom: 6px;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; margin: 3px 0; cursor: pointer; padding: 2px 4px; border-radius: 4px; user-select: none; }
        .legend-item:hover { background: rgba(0,0,0,0.04); }
        .legend-item.disabled { opacity: 0.3; text-decoration: line-through; }
        .legend-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; border: 2px solid rgba(0,0,0,0.15); }
        .legend-label { font-size: 12px; color: #374151; }
        .legend-count { font-size: 11px; color: #9ca3af; margin-left: auto; }

        /* Incident panel */
        .incident-panel {
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            max-width: 320px;
            max-height: 70vh;
            overflow-y: auto;
        }
        .incident-panel h4 {
            font-size: 13px; margin-bottom: 8px; color: #111;
            border-bottom: 1px solid #e5e7eb; padding-bottom: 6px;
        }
        .filter-row {
            display: flex; gap: 6px; margin-bottom: 10px;
        }
        .filter-row select {
            flex: 1; background: #fff; color: #1a1a1a; border: 1px solid #d1d5db;
            border-radius: 5px; padding: 5px 8px; font-size: 11px; cursor: pointer;
            appearance: auto;
        }
        .filter-row select:focus { outline: 1px solid #6b7280; }
        .country-group { margin-bottom: 8px; }
        .country-header {
            font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
            color: #6b7280; margin: 8px 0 4px; font-weight: 600;
            display: flex; align-items: center; gap: 6px;
        }
        .country-header .count { color: #9ca3af; font-size: 10px; }
        .inc-item {
            display: flex; align-items: center; gap: 8px;
            padding: 5px 4px; border-bottom: 1px solid #f3f4f6;
            cursor: pointer; border-radius: 4px;
        }
        .inc-item:hover { background: rgba(0,0,0,0.03); }
        .inc-item:last-child { border-bottom: none; }
        .inc-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .inc-info { flex: 1; min-width: 0; }
        .inc-name { font-size: 12px; font-weight: 600; color: #1f2937; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .inc-type { font-size: 10px; color: #6b7280; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .inc-sev { font-size: 10px; font-weight: 700; text-align: right; min-width: 40px; text-transform: uppercase; }

        /* Summary panel */
        .summary-panel {
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            max-width: 300px;
            max-height: 50vh;
            overflow-y: auto;
        }
        .summary-panel h4 {
            font-size: 13px; margin-bottom: 8px; color: #111;
            border-bottom: 1px solid #e5e7eb; padding-bottom: 6px;
        }
        .summary-detail { font-size: 11px; color: #4b5563; line-height: 1.6; margin-bottom: 6px; }
        .summary-detail strong { color: #1f2937; }
        .summary-stat { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin: 2px 2px; }

        /* Popup styling */
        .leaflet-popup-content-wrapper {
            background: rgba(255, 255, 255, 0.98) !important;
            color: #1a1a1a !important;
            border: 1px solid #d1d5db !important;
            border-radius: 10px !important;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12) !important;
        }
        .leaflet-popup-tip { background: rgba(255, 255, 255, 0.98) !important; }
        .leaflet-popup-content { margin: 14px 16px !important; font-size: 13px; line-height: 1.5; max-width: 360px; max-height: 350px; overflow-y: auto; }
        .popup-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; color: #111; }
        .popup-category { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; padding: 2px 8px; border-radius: 4px; display: inline-block; }
        .popup-detail { margin: 4px 0; font-size: 12px; color: #4b5563; }
        .popup-detail strong { color: #1f2937; }
        .popup-country { margin-top: 6px; padding: 4px 10px; background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.2); border-radius: 6px; display: inline-block; font-size: 12px; color: #4f46e5; font-weight: 600; }
        .popup-incidents { margin-top: 8px; padding-top: 8px; border-top: 1px solid #e5e7eb; font-size: 12px; color: #374151; }
        .popup-incidents li { margin: 3px 0; margin-left: 14px; }
        .popup-sources { margin-top: 8px; padding-top: 8px; border-top: 1px solid #e5e7eb; }
        .popup-sources-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #9ca3af; margin-bottom: 4px; }
        .popup-sources-list { font-size: 11px; color: #2563eb; }
        .popup-sources-list a { color: #2563eb; text-decoration: none; }
        .popup-sources-list a:hover { text-decoration: underline; }
        .sev-critical { background: #dc2626; color: #fff; }
        .sev-high { background: #ea580c; color: #fff; }
        .sev-watchlist { background: #6b7280; color: #fff; }

        /* Stats bar */
        .stats-bar {
            position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(255, 255, 255, 0.96);
            border: 1px solid #d1d5db; border-radius: 10px;
            padding: 10px 20px; display: flex; gap: 28px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            font-size: 12px;
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 20px; font-weight: 700; }
        .stat-label { color: #6b7280; font-size: 11px; }

        /* Scrollbar styling */
        .incident-panel::-webkit-scrollbar,
        .summary-panel::-webkit-scrollbar { width: 4px; }
        .incident-panel::-webkit-scrollbar-track,
        .summary-panel::-webkit-scrollbar-track { background: transparent; }
        .incident-panel::-webkit-scrollbar-thumb,
        .summary-panel::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

        /* Mobile top bar */
        .mobile-topbar { display: none; }
        /* Mobile mini legend */
        .mobile-legend { display: none; }
        /* Mobile bottom sheet */
        .mobile-sheet { display: none; }

        /* Mobile */
        @media (max-width: 768px) {
            .incident-panel { display: none !important; }
            .legend { display: none !important; }
            .summary-panel { display: none !important; }
            .title-overlay { display: none !important; }
            #stat-updated-item { display: none !important; }

            /* Slim stats bar: fixed to bottom */
            .stats-bar {
                position: fixed;
                bottom: 0; left: 0; right: 0; width: 100%;
                transform: none; border-radius: 0;
                padding: 8px 0; gap: 0;
                justify-content: space-evenly;
                border-left: none; border-right: none; border-bottom: none;
            }
            .stat-item { flex: 1; }
            .stat-item:nth-child(2),
            .stat-item:nth-child(3),
            .stat-item:nth-child(6) { display: none; }
            .stat-value { font-size: 18px; }
            .stat-label { font-size: 9px; }

            /* Mobile top bar */
            .mobile-topbar {
                display: flex; position: absolute; top: 0; left: 0; right: 0;
                z-index: 1000; background: rgba(255,255,255,0.96);
                border-bottom: 1px solid #e5e7eb;
                padding: 10px 14px; align-items: center; justify-content: space-between;
                box-shadow: 0 1px 8px rgba(0,0,0,0.08);
            }
            .mobile-topbar-title {
                font-size: 13px; font-weight: 700; color: #b91c1c;
                letter-spacing: 0.3px;
            }
            .mobile-topbar-updated {
                font-size: 10px; color: #6b7280;
            }

            /* Mobile mini legend */
            .mobile-legend {
                display: flex; position: absolute; top: 42px; left: 0; right: 0;
                z-index: 1000; background: rgba(255,255,255,0.92);
                border-bottom: 1px solid #e5e7eb;
                padding: 5px 14px; gap: 16px; justify-content: center;
                font-size: 10px; color: #374151;
            }
            .mobile-legend-item {
                display: flex; align-items: center; gap: 4px;
            }
            .mobile-legend-dot {
                width: 8px; height: 8px; border-radius: 50%;
                border: 1.5px solid rgba(0,0,0,0.1);
            }

            /* Mobile bottom sheet — peek handle by default */
            .mobile-sheet {
                display: block; position: fixed; bottom: 46px; left: 0; right: 0;
                z-index: 1001; background: #fff;
                border-top-left-radius: 14px; border-top-right-radius: 14px;
                box-shadow: 0 -2px 16px rgba(0,0,0,0.12);
                max-height: 55vh;
                transform: translateY(calc(100% - 44px));
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .mobile-sheet.open {
                transform: translateY(0);
            }
            .mobile-sheet-handle {
                display: flex; align-items: center; justify-content: center;
                gap: 8px; padding: 12px 16px; cursor: pointer;
                border-bottom: 1px solid #f3f4f6;
                -webkit-tap-highlight-color: transparent;
                background: #fff;
                border-top-left-radius: 14px; border-top-right-radius: 14px;
            }
            .mobile-sheet-bar {
                width: 32px; height: 4px; border-radius: 2px;
                background: #d1d5db;
            }
            .mobile-sheet-label {
                font-size: 12px; font-weight: 600; color: #374151;
            }
            .mobile-sheet-content {
                overflow-y: auto; max-height: calc(55vh - 44px);
                padding: 4px 12px 12px;
                -webkit-overflow-scrolling: touch;
            }
            .mobile-sheet-content .inc-item {
                padding: 8px 4px;
            }
            .mobile-sheet-content .inc-name {
                font-size: 13px;
            }
            .mobile-sheet-content .inc-dot {
                width: 12px; height: 12px;
            }

            /* Popup sizing & scrollability */
            .leaflet-popup-content {
                max-width: 80vw !important;
                max-height: 45vh !important;
                overflow-y: auto !important;
                -webkit-overflow-scrolling: touch;
                font-size: 12px;
            }
            .leaflet-popup-content-wrapper {
                overflow: hidden !important;
            }
            .popup-title { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="title-overlay">
        <h1>GULF CONFLICT UPDATES</h1>
        <p>Live map of verified Iranian strikes & threats across Gulf states</p>
    </div>

    <!-- Mobile top bar -->
    <div class="mobile-topbar">
        <span class="mobile-topbar-title">GULF CONFLICT UPDATES</span>
        <span class="mobile-topbar-updated" id="mobile-updated"></span>
    </div>

    <!-- Mobile mini legend -->
    <div class="mobile-legend">
        <div class="mobile-legend-item"><div class="mobile-legend-dot" style="background:#dc2626"></div>Hit</div>
        <div class="mobile-legend-item"><div class="mobile-legend-dot" style="background:#ea580c"></div>Debris</div>
        <div class="mobile-legend-item"><div class="mobile-legend-dot" style="background:#6b7280"></div>Watch</div>
    </div>

    <!-- Mobile bottom sheet -->
    <div class="mobile-sheet" id="mobile-sheet">
        <div class="mobile-sheet-handle" id="mobile-sheet-handle">
            <div class="mobile-sheet-bar"></div>
            <span class="mobile-sheet-label" id="mobile-sheet-label">Incidents</span>
        </div>
        <div class="mobile-sheet-content" id="mobile-sheet-content"></div>
    </div>

    <div class="stats-bar">
        <div class="stat-item"><div class="stat-value" style="color:#dc2626" id="stat-critical">0</div><div class="stat-label">Hit</div></div>
        <div class="stat-item"><div class="stat-value" style="color:#ea580c" id="stat-high">0</div><div class="stat-label">Debris</div></div>
        <div class="stat-item"><div class="stat-value" style="color:#6b7280" id="stat-watchlist">0</div><div class="stat-label">Watchlist</div></div>
        <div class="stat-item"><div class="stat-value" style="color:#b91c1c" id="stat-killed">0</div><div class="stat-label">Killed</div></div>
        <div class="stat-item"><div class="stat-value" style="color:#b45309" id="stat-injured">0</div><div class="stat-label">Injured</div></div>
        <div class="stat-item"><div class="stat-value" style="color:#4f46e5" id="stat-countries">0</div><div class="stat-label">Countries</div></div>
        <div class="stat-item" id="stat-updated-item"><div class="stat-value" style="color:#6b7280;font-size:13px" id="stat-updated">—</div><div class="stat-label">Last Updated (GMT)</div></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
