name: Auto-update strike data
on:
  schedule:
    - cron: '0 */2 * * *'  
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run without writing changes'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - id: update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: node scripts/update.mjs

      - name: Commit and push
        if: steps.update.outputs.has_changes == 'true'
        run: |
          git config user.name "gulf-map-bot"
          git config user.email "gulf-map-bot@users.noreply.github.com"
          git add data.js
          git diff --staged --quiet && exit 0
          git commit -m "${{ steps.update.outputs.commit_message }}"
          git push

      - name: Email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Gulf Map [${{ job.status }}] — ${{ steps.update.outputs.has_changes == 'true' && steps.update.outputs.commit_message || 'No changes' }}"
          to: vedantkhanna@gmail.com
          from: Gulf Map Bot <${{ secrets.GMAIL_USER }}>
          body: |
            ${{ steps.update.outputs.report || 'Script did not produce a report. Check the run logs.' }}

            ────────────────────────────────
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Map: https://gulf-map.vercel.app
